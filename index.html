<!DOCTYPE html>

<html lang="zh-CN">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>卡牌铸造厂：模板大师 (Card Forge)</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="h-screen flex flex-col">



    <!-- 顶部导航 -->

    <div
        class="h-14 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-6 z-20 shadow-md relative">

        <div class="flex items-center gap-2">

            <i class="fa-solid fa-hammer text-blue-500"></i>

            <h1 class="font-bold text-lg tracking-wider">卡牌铸造厂 <span
                    class="text-xs bg-gray-700 px-1 rounded text-gray-300">Pro</span></h1>

        </div>



        <div class="flex gap-8">

            <button id="btnModeTemplate" class="mode-btn active flex items-center gap-2 py-4 font-bold">

                <i class="fa-solid fa-pen-ruler"></i> 模板编辑 (Designer)

            </button>

            <button id="btnModeCard" class="mode-btn flex items-center gap-2 py-4 font-bold">

                <i class="fa-solid fa-address-card"></i> 卡牌编辑 (Editor)

            </button>

            <button id="btnModeDeck" class="mode-btn flex items-center gap-2 py-4 font-bold">

                <i class="fa-solid fa-layer-group"></i> 卡组总览 (Gallery)

            </button>

        </div>



        <div class="flex gap-2 items-center">

            <!-- 全量备份按钮组 -->

            <div class="flex bg-gray-800 rounded mr-4 border border-gray-700 overflow-hidden shadow-inner">
                <button onclick="app.bindObsidianFolder()"
                    class="px-3 py-1.5 text-xs text-gray-400 hover:text-white hover:bg-gray-700 transition-colors border-r border-gray-700 flex items-center gap-1.5">
                    <i class="fa-solid fa-link text-blue-400"></i> 绑定目录
                </button>

                <button onclick="app.syncAllFromObsidian()"
                    class="px-3 py-1.5 text-xs text-indigo-300 hover:text-white hover:bg-indigo-900/40 transition-colors border-r border-gray-700 flex items-center gap-1.5">
                    <i class="fa-solid fa-cloud-arrow-down"></i> 自动更新
                </button>

                <button onclick="app.exportAllToObsidian()"
                    class="px-3 py-1.5 text-xs text-green-400 hover:text-white hover:bg-green-900/40 transition-colors font-bold flex items-center gap-1.5"
                    title="将当前程序的改动保存回 Obsidian 笔记">
                    <i class="fa-solid fa-cloud-arrow-up"></i> 保存到 MD
                </button>
            </div>



            <button id="btnGlobalExport"
                class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded text-sm font-bold transition-colors">

                <i class="fa-solid fa-image"></i> 导出图片 (HD)

            </button>

        </div>

    </div>



    <!-- 悬浮按钮区域 (移除闪烁动画) -->

    <div id="floatingControls" class="fixed top-20 right-4 z-50 flex flex-col gap-2">

        <!-- 返回卡组按钮 -->

        <button id="btnReturnToDeck" onclick="app.switchToDeckView()"
            class="hidden bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg font-bold transition-all shadow-xl border border-gray-600 flex items-center gap-2">

            <i class="fa-solid fa-arrow-left text-blue-400"></i> 返回卡组

        </button>

    </div>



    <!-- 主体内容 -->

    <div class="flex-1 flex overflow-hidden">



        <!-- 左侧面板 -->

        <div id="leftPanel" class="bg-gray-900 border-r border-gray-800 flex flex-col shadow-xl z-10"
            style="width: 384px; min-width: 250px; max-width: 600px;">



            <!-- A. 模板编辑面板 -->

            <div id="panelTemplate" class="flex flex-col h-full">

                <div class="p-2 bg-gray-800 border-b border-gray-700 space-y-2">

                    <div class="flex items-center gap-1">
                        <div class="relative flex-1">
                            <i class="fa-solid fa-layer-group absolute left-2 top-2 text-[10px] text-gray-500"></i>
                            <select id="designerTemplateSelector" onchange="app.loadTemplateForDesigner(this.value)"
                                class="w-full pl-6 pr-1 py-1 text-xs rounded bg-gray-900 border border-gray-700 focus:border-blue-500 outline-none appearance-none cursor-pointer">
                                <option value="">-- 选择模板 --</option>
                            </select>
                        </div>
                        <button onclick="app.deleteTemplateFromLibrary()"
                            class="p-1.5 text-gray-500 hover:text-red-400 bg-gray-900 border border-gray-700 rounded transition-colors"
                            title="删除模板">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                        <button onclick="app.initNewTemplate()"
                            class="p-1.5 text-blue-400 hover:text-white bg-blue-900/30 border border-blue-800/50 rounded transition-colors"
                            title="新建模板">
                            <i class="fa-solid fa-plus text-xs"></i>
                        </button>
                    </div>

                    <div class="flex items-center gap-1">
                        <input type="text" id="tplNameInput"
                            class="flex-1 px-2 py-1 text-xs rounded bg-gray-900 border border-gray-700 focus:border-blue-500 outline-none placeholder-gray-600"
                            placeholder="输入模板名称...">
                        <button onclick="app.saveTemplateToLibrary()"
                            class="px-2 py-1 bg-green-700 hover:bg-green-600 text-white rounded text-[10px] font-bold flex items-center gap-1 shadow-sm transition-colors">
                            <i class="fa-solid fa-floppy-disk"></i> 保存
                        </button>
                    </div>

                    <div class="flex gap-4 px-1 text-[10px]">
                        <div class="flex items-center gap-1 flex-1">
                            <span class="text-gray-500 font-bold">W</span>
                            <input type="number" id="tplWidthInput"
                                class="w-full bg-transparent border-b border-gray-700 px-1 py-0.5 outline-none focus:border-blue-500 text-gray-300">
                        </div>
                        <div class="flex items-center gap-1 flex-1">
                            <span class="text-gray-500 font-bold">H</span>
                            <input type="number" id="tplHeightInput"
                                class="w-full bg-transparent border-b border-gray-700 px-1 py-0.5 outline-none focus:border-blue-500 text-gray-300">
                        </div>
                    </div>
                </div>

                <div class="p-1.5 bg-gray-900/50 border-b border-gray-800">
                    <div class="grid grid-cols-3 gap-1">
                        <button onclick="app.addElement('static-image')"
                            class="flex items-center justify-center gap-1.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded border border-gray-700 text-gray-300 transition-all group">
                            <i class="fa-regular fa-image text-blue-400 text-xs group-hover:scale-110"></i>
                            <span class="text-[10px]">固定图</span>
                        </button>
                        <button onclick="app.addElement('user-image')"
                            class="flex items-center justify-center gap-1.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded border border-gray-700 text-gray-300 transition-all group">
                            <i class="fa-solid fa-upload text-green-400 text-xs group-hover:scale-110"></i>
                            <span class="text-[10px]">用户图</span>
                        </button>
                        <button onclick="app.addElement('text')"
                            class="flex items-center justify-center gap-1.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded border border-gray-700 text-gray-300 transition-all group">
                            <i class="fa-solid fa-font text-yellow-400 text-xs group-hover:scale-110"></i>
                            <span class="text-[10px]">文字层</span>
                        </button>
                    </div>
                </div>


                <!-- 图层列表 -->

                <div class="flex-1 overflow-y-auto p-2 min-h-0" id="layerList"></div>


                <div id="uiResizerV"
                    class="h-1 hover:h-1.5 bg-gray-800 hover:bg-blue-600 cursor-row-resize z-20 transition-all active:bg-blue-500 shadow-[0_1px_5px_rgba(0,0,0,0.5)]">
                </div>
                <!-- 属性编辑器 (高度 40%) -->

                <div id="propEditor" class="border-t border-gray-800 p-3 bg-gray-800 overflow-y-auto hidden text-xs"
                    style="height: 200px; min-height: 100px; max-height: 80% ;">

                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-blue-400">
                            <i class="fa-solid fa-sliders mr-1"></i>属性编辑
                        </span>
                        <div class="flex gap-2">
                            <button onclick="app.duplicateSelected()"
                                class="text-blue-400 hover:text-blue-300 hover:bg-blue-900/20 px-2 py-0.5 rounded transition-colors flex items-center gap-1">
                                <i class="fa-solid fa-copy text-[10px]"></i>复制
                            </button>

                            <button onclick="app.deleteSelected()"
                                class="text-red-500 hover:text-red-400 hover:bg-red-900/20 px-2 py-0.5 rounded transition-colors flex items-center gap-1">
                                <i class="fa-solid fa-trash-can text-[10px]"></i>删除
                            </button>
                        </div>
                    </div>



                    <div class="space-y-2">

                        <div class="flex items-center gap-2">

                            <span class="text-gray-500 w-8">标签</span>

                            <input type="text" id="propLabel"
                                class="flex-1 p-1 rounded bg-gray-800 border border-gray-700 focus:border-blue-500">

                        </div>



                        <div class="grid grid-cols-4 gap-1">

                            <div><label class="block text-gray-600 text-[10px] text-center">X</label><input
                                    type="number" id="propX" class="w-full p-1 rounded bg-gray-800 text-center"></div>

                            <div><label class="block text-gray-600 text-[10px] text-center">Y</label><input
                                    type="number" id="propY" class="w-full p-1 rounded bg-gray-800 text-center"></div>

                            <div><label class="block text-gray-600 text-[10px] text-center">W</label><input
                                    type="number" id="propW" class="w-full p-1 rounded bg-gray-800 text-center"></div>

                            <div><label class="block text-gray-600 text-[10px] text-center">H</label><input
                                    type="number" id="propH" class="w-full p-1 rounded bg-gray-800 text-center"></div>

                        </div>



                        <div id="dynamicProps" class="space-y-2 pt-2 border-t border-gray-700/50"></div>



                        <div class="flex gap-1 pt-1">

                            <button onclick="app.moveLayer(-1)"
                                class="flex-1 py-1 bg-gray-800 hover:bg-gray-700 rounded border border-gray-600 text-[10px]"><i
                                    class="fa-solid fa-arrow-down"></i> 下移</button>

                            <button onclick="app.moveLayer(1)"
                                class="flex-1 py-1 bg-gray-800 hover:bg-gray-700 rounded border border-gray-600 text-[10px]"><i
                                    class="fa-solid fa-arrow-up"></i> 上移</button>

                        </div>

                    </div>

                </div>



                <div class="p-2 border-t border-gray-800 flex flex-col gap-2 text-[10px] bg-gray-900 flex-shrink-0">
                    <div class="flex gap-2">
                        <button onclick="app.exportTemplatePackage()"
                            class="flex-1 bg-blue-700 hover:bg-blue-600 py-1.5 rounded text-white transition-colors flex items-center justify-center gap-1">
                            <i class="fa-solid fa-box-archive"></i> 导出完整包 (.cfpkg)
                        </button>

                        <button onclick="document.getElementById('fileTemplatePackage').click()"
                            class="flex-1 bg-indigo-700 hover:bg-indigo-600 py-1.5 rounded text-white transition-colors flex items-center justify-center gap-1">
                            <i class="fa-solid fa-file-import"></i> 导入完整包
                        </button>
                    </div>

                    <input type="file" id="fileTemplatePackage" accept=".cfpkg,.json" class="hidden"
                        onchange="app.importTemplatePackage(this.files[0])">

                    <input type="file" id="fileTemplate" class="hidden">
                </div>

            </div>



            <!-- B. 卡牌编辑面板 -->

            <div id="panelCard" class="flex flex-col h-full hidden">

                <div class="p-4 border-b border-gray-800 bg-gray-800/80">

                    <button onclick="app.createNewCard()"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded text-sm font-bold flex items-center justify-center gap-2 shadow-lg transition-transform active:scale-95">

                        <i class="fa-solid fa-plus"></i> 新建卡牌 (选择模板)

                    </button>

                </div>



                <div class="p-4 bg-gray-800 border-b border-gray-700 space-y-3">

                    <div class="flex justify-between items-center">

                        <h2 class="text-xs font-bold text-purple-400 uppercase">当前卡牌信息</h2>

                        <div class="flex gap-1">

                            <button onclick="app.saveCardToLibrary()"
                                class="bg-green-700 hover:bg-green-600 text-white px-2 py-1 rounded text-xs transition-colors"
                                title="保存卡牌">

                                <i class="fa-solid fa-floppy-disk"></i>

                            </button>

                            <button onclick="app.deleteCardFromLibrary()"
                                class="bg-red-900 hover:bg-red-800 text-white px-2 py-1 rounded text-xs transition-colors"
                                title="删除卡牌">

                                <i class="fa-solid fa-trash-can"></i>

                            </button>

                        </div>

                    </div>



                    <div>

                        <label class="block text-xs text-gray-500 mb-1">卡牌名称</label>

                        <input type="text" id="cardNameInput"
                            class="w-full p-1.5 rounded bg-gray-900 text-sm font-bold border border-purple-900/50 focus:border-purple-500"
                            placeholder="例如：深渊巨兽">

                    </div>



                    <div>

                        <label class="block text-xs text-gray-500 mb-1">所属卡组 (Deck)</label>

                        <div class="flex gap-1">

                            <input list="deckList" type="text" id="cardDeckInput"
                                class="flex-1 p-1.5 rounded bg-gray-900 text-sm border border-purple-900/50 focus:border-purple-500"
                                placeholder="默认卡组">

                            <datalist id="deckList"></datalist>

                        </div>

                    </div>

                </div>



                <div class="p-3 bg-gray-900 border-b border-gray-800">

                    <label class="block text-xs text-gray-500 mb-1 flex justify-between items-end">

                        <span>我的卡牌库</span>

                        <div class="flex items-center gap-1">

                            <i class="fa-solid fa-filter text-purple-500 text-[10px]"></i>

                            <select id="deckFilter" onchange="app.updateCardSelectorUI()"
                                class="bg-transparent text-purple-400 font-bold outline-none border-none p-0 text-xs text-right cursor-pointer max-w-[100px]">

                                <option value="ALL">全部卡组</option>

                            </select>

                            <button onclick="app.createNewDeck()" class="text-purple-400 hover:text-white px-1"
                                title="新建卡组">

                                <i class="fa-solid fa-folder-plus"></i>

                            </button>

                        </div>

                    </label>

                    <select id="cardSelector" onchange="app.loadCardFromLibrary(this.value)"
                        class="w-full p-2 text-sm rounded bg-gray-800 border border-gray-700 focus:border-purple-500">

                        <option value="">-- 选择加载卡牌 --</option>

                    </select>

                </div>



                <div class="flex-1 overflow-y-auto p-4 space-y-4" id="cardInputs">

                    <div class="text-center text-gray-500 mt-10">

                        <i class="fa-solid fa-ghost text-2xl mb-2"></i>

                        <p class="text-sm">尚未开始</p>

                        <p class="text-xs mt-2">请点击顶部的“新建卡牌”</p>

                    </div>

                </div>



                <div class="p-3 border-t border-gray-800 flex gap-2">

                    <button onclick="app.exportCardData()"
                        class="flex-1 bg-purple-700 hover:bg-purple-600 py-2 rounded text-xs text-white">导出数据文件</button>

                    <button onclick="document.getElementById('fileCard').click()"
                        class="flex-1 bg-purple-700 hover:bg-purple-600 py-2 rounded text-xs text-white">导入数据文件</button>

                    <input type="file" id="fileCard" accept=".json" class="hidden">

                </div>

            </div>



            <!-- C. 卡组浏览模式 -->

            <div id="panelDeckView" class="flex flex-col h-full hidden">
                <div class="p-4 border-b border-gray-800 bg-gray-800 flex flex-col gap-2">
                    <div class="flex items-center justify-between">
                        <h2 class="text-sm font-bold text-gray-300 uppercase tracking-wider">卡组列表</h2>
                        <div class="flex gap-2">
                            <button onclick="app.importMarkdown()"
                                class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1 rounded transition flex items-center gap-1">
                                <i class="fa-solid fa-file-import"></i> 导入 MD
                            </button>

                            <button id="btnAutoExport"
                                class="text-xs bg-purple-700/70 hover:bg-purple-600 text-white px-3 py-1 rounded disabled:opacity-40 disabled:cursor-not-allowed transition"
                                onclick="app.startAutoExportSequence()" disabled>
                                自动导出图片
                            </button>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500">点击卡组查看卡牌</p>
                </div>
                <div class="flex-1 overflow-y-auto p-2 space-y-1" id="deckListContainer"></div>
            </div>



        </div>
        <div id="uiResizer"
            class="w-1 hover:w-1.5 bg-gray-800 hover:bg-blue-600 cursor-col-resize z-20 transition-all active:bg-blue-500 shadow-[1px_0_5px_rgba(0,0,0,0.5)]">
        </div>



        <!-- 右侧画布区域 -->

        <div class="flex-1 canvas-bg relative flex flex-col items-center justify-center p-8 overflow-hidden bg-[#1a1a1a]"
            id="workspaceContainer">

            <!-- Canvas 容器 -->

            <div id="canvasWrapper"
                class="relative shadow-[0_0_50px_rgba(0,0,0,0.9)] border border-gray-700 transition-transform duration-100 ease-out origin-center">

                <canvas id="mainCanvas"></canvas>

                <div id="interactionLayer" class="absolute inset-0 cursor-default"></div>

            </div>



            <div id="deckGridWrapper" class="hidden absolute inset-0 p-4 overflow-y-auto w-full h-full">

                <!-- Grid -->

                <div id="deckGrid"
                    class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 p-4 pb-20 w-full"></div>

            </div>



            <div
                class="absolute bottom-4 right-4 bg-black/70 backdrop-blur px-3 py-1.5 rounded text-xs text-gray-400 pointer-events-none z-10">

                <span id="canvasSizeDisplay">400 x 600 | Zoom: 100%</span>

            </div>

        </div>



    </div>



    <!-- 弹窗和工具 -->

    <canvas id="previewCanvas" class="card-preview-hover"></canvas>



    <div id="templateModal"
        class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden transition-opacity">

        <div class="bg-gray-900 border border-gray-700 rounded-lg p-6 w-96 shadow-2xl modal-enter transform">

            <div class="flex justify-between items-center mb-4">

                <h3 class="text-lg font-bold text-white flex items-center gap-2">

                    <i class="fa-solid fa-layer-group text-blue-500"></i> 选择基础模板

                </h3>

                <button onclick="document.getElementById('templateModal').classList.add('hidden')"
                    class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>

            </div>

            <div id="modalTemplateList" class="space-y-2 max-h-80 overflow-y-auto mb-4 pr-1"></div>

            <div class="pt-4 border-t border-gray-800 text-center">

                <button onclick="document.getElementById('templateModal').classList.add('hidden')"
                    class="text-gray-400 hover:text-white text-sm">取消</button>

            </div>

        </div>

    </div>

    <script src="js/utils.js"></script>

    <script src="js/storage.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
